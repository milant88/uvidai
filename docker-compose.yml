# Local PostgreSQL for API + Prisma (matches .env.example DATABASE_URL)
services:
  postgres:
    image: postgres:16-alpine
    container_name: uvidai-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: uvidai
      POSTGRES_PASSWORD: uvidai_dev
      POSTGRES_DB: uvidai
    volumes:
      - uvidai_pgdata:/var/lib/postgresql/data

volumes:
  uvidai_pgdata:
